services:
  redis:
    image: redis:alpine
    container_name: plate-redis
    restart: unless-stopped
    ports:
      - '${DKR_REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local
